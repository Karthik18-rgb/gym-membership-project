spring.application.name=gym-management

spring.datasource.url=jdbc:mysql://localhost:3306/gym_management
spring.datasource.username=root
spring.datasource.password=vergildantenero@dmc12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
jwt.secret=GymManagementSuperSecretKeyForPortfolioProject123456789
jwt.expiration=86400000
server.port=8000

# ==========================
# SPRING BOOT DEVTOOLS (HOT RELOAD)
# ==========================
spring.devtools.restart.enabled=true
spring.devtools.restart.additional-paths=src/main/java
spring.devtools.restart.poll-interval=1s
spring.devtools.restart.quiet-period=400ms
spring.devtools.livereload.enabled=true
spring.devtools.livereload.port=35729
spring.devtools.remote.restart.enabled=false

# ==========================
# ACTUATOR
# ==========================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.mappings.access=unrestricted

# ==========================
# DEBUG LOGGING
# ==========================
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=TRACE
